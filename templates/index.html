<!DOCTYPE html>
<html lang="en">
  
<head>
  <title>FlightScope - Know Before You Fly</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="topbar">
      <a href="/" class="brand">Flight<span>Scope</span></a>
    </div>

    <div class="hero">
      <h1>Know before you land</h1>
      <p>Enter your flight number to see what's happening at your destination.</p>
    </div>

    <div class="search-card card">
      {% if error %}
      <div class="form-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/results">
        <label class="field-label" for="flight_number">Flight number</label>
        <input class="field-input" type="text" id="flight_number" name="flight_number"
               placeholder="e.g. AA100" autocomplete="off" required>

        <button type="submit" class="btn-primary">Get my results!</button>
      </form>
    </div>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <p>Fetching your results...</p>
    </div>

    <script>
      document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("loadingOverlay").classList.add("active");
      });
    </script>
</body>

</html>
